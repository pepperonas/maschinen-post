spring:
  application:
    name: maschinenpost
  datasource:
    url: jdbc:sqlite:maschinenpost.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

maschinenpost:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-20250514
    max-tokens: 1024
  scheduler:
    feed-fetch-rate: 1800000
