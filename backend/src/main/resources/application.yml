spring:
  application:
    name: maschinenpost
  datasource:
    url: jdbc:sqlite:maschinenpost.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

maschinenpost:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 512
  scheduler:
    feed-fetch-rate: 1800000
