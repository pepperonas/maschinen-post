spring:
  application:
    name: maschinenpost
  datasource:
    url: jdbc:sqlite:maschinenpost.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

maschinenpost:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 256
  scheduler:
    feed-fetch-rate: 43200000
  retention:
    days: 90
