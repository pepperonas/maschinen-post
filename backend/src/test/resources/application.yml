spring:
  datasource:
    url: jdbc:sqlite::memory:
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

maschinenpost:
  claude:
    api-key:
    model: claude-haiku-4-5-20251001
    max-tokens: 512
  scheduler:
    feed-fetch-rate: 10800000
